# Fixture: coturn service with shell-passthrough command.
#
# The `command` string below contains bare `$VAR` references (no braces).
# The interpolator MUST leave them verbatim; they are expanded by the shell
# at container startup time (`entrypoint = ["/bin/sh", "-c"]`).
#
# This fixture also contains `${VAR:-default}` references that SHOULD be
# expanded by the interpolator.

[project]
name = "coturn-test"

[services.coturn]
image = "coturn/coturn:4.11.0-r0@sha256:5d1d717c0542b70c97c006ac8e38d4e9a6c9a7962ac7b1a11a7a2c42ab655902"
restart = "unless-stopped"
network_mode = "host"
volumes = [
  "./coturn.conf:/etc/coturn/turnserver.conf:ro",
  "coturn-data:/var/lib/coturn",
]
environment = [
  "TURN_SECRET=${TURN_SECRET:-change-me-in-production}",
  "TURN_REALM=${TURN_REALM:-burble.local}",
  "TURN_EXTERNAL_IP=${TURN_EXTERNAL_IP:-}",
]
entrypoint = ["/bin/sh", "-c"]
# The key line: $args, $TURN_SECRET, $TURN_REALM, $TURN_EXTERNAL_IP have no
# braces → selur-compose-interp must leave them unchanged.
command = ["args='--config /etc/coturn/turnserver.conf'; args=\"$args --static-auth-secret=$TURN_SECRET --realm=$TURN_REALM\"; [ -n \"$TURN_EXTERNAL_IP\" ] && args=\"$args --external-ip=$TURN_EXTERNAL_IP\"; exec turnserver $args"]

[volumes.coturn-data]
driver = "local"
