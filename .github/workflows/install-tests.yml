# SPDX-License-Identifier: MPL-2.0
#
# install-tests.yml — cross-platform validation for the service-install
# machinery (setup.sh, setup.ps1, scripts/install-service.sh,
# scripts/wsl-bolt-udp-forward.ps1, assets/services/*).
#
# Three jobs cover three OSes; each is the lightest validation that
# would have caught the bugs we've already hit (unsubstituted tokens,
# AmbientCapabilities-in-user-unit, inline-`;` Justfile recipes, etc.):
#
#   lint-linux    Render systemd units in both modes, systemd-analyze
#                 verify, shellcheck, plist XML validity, setup.sh
#                 dispatch.
#   lint-macos    plutil -lint on the real macOS host (catches plist
#                 schema issues xmllint misses) + setup.sh OS dispatch.
#   lint-windows  PowerShell AST parse + PSScriptAnalyzer + verify
#                 csc.exe is reachable so the C# service-host compile
#                 would succeed at install time.
#
# Round-trip (actual install/start/stop/uninstall) is intentionally
# *not* in CI yet: --user systemd in GH Actions needs `linger` gymnastics,
# and the Windows install needs a throwaway credentialed user with
# `Log on as a service`. Those are tractable but worth a follow-up PR.

name: Install tests
on:
  push:
    branches: [main, master, 'claude/**']
    paths:
      - 'setup.sh'
      - 'setup.ps1'
      - 'scripts/install-service.sh'
      - 'scripts/wsl-bolt-udp-forward.ps1'
      - 'assets/services/**'
      - 'tests/install/**'
      - '.github/workflows/install-tests.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'setup.sh'
      - 'setup.ps1'
      - 'scripts/install-service.sh'
      - 'scripts/wsl-bolt-udp-forward.ps1'
      - 'assets/services/**'
      - 'tests/install/**'
      - '.github/workflows/install-tests.yml'
permissions:
  contents: read
jobs:
  lint-linux:
    name: Lint (Linux / systemd / shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install validators
        run: |
          sudo apt-get update -qq
          # systemd / systemd-analyze are preinstalled on ubuntu-latest;
          # installing the metapackage on top of a running PID-1 systemd
          # can fail or restart services. Just install the linters we need.
          sudo apt-get install -y --no-install-recommends \
            shellcheck libxml2-utils
      - name: Show env diagnostics
        run: |
          echo "uname:     $(uname -a)"
          echo "bash:      $BASH_VERSION"
          echo "pwsh:      $(command -v pwsh || echo none)"
          echo "powershell:$(command -v powershell || echo none)"
          command -v pwsh >/dev/null && pwsh -NoProfile -Command 'Get-Module -ListAvailable PSScriptAnalyzer | Select-Object Name,Version' || true
          echo "systemd-analyze: $(command -v systemd-analyze || echo none)"
          echo "xmllint:   $(command -v xmllint || echo none)"
          echo "shellcheck: $(command -v shellcheck || echo none) $(shellcheck --version | head -2)"
      - name: Run install test suite
        env:
          BURBLE_INSTALL_TESTS_DEBUG: "1"
        run: |
          set +e
          tests/install/run.sh 2>&1 | tee /tmp/run-out.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" != "0" ]; then
              echo
              echo "::error title=run.sh failed::exit=$rc — FAIL lines surfaced as annotations below:"
              # Strip ANSI colour codes FIRST so awk sees plain text.
              # (fail() emits `  \033[0;31mFAIL\033[0m msg` — without
              # stripping, "FAIL " pattern won't match because of the
              # \033[0m sitting between FAIL and the space.)
              sed 's/\x1b\[[0-9;]*m//g' /tmp/run-out.log > /tmp/run-out.plain
              # GH caps annotations at ~10 per check-run. Surface ONLY
              # FAIL lines (with the 6-space-indented sub-line that
              # follows, which is where shellcheck/plutil/etc. dump
              # their actual error message).
              awk '/FAIL /{p=1; print; next} p && /^      /{print; next} {p=0}' /tmp/run-out.plain \
                | head -20 \
                | while IFS= read -r line; do
                    echo "::error::$line"
                done
              echo "::group::Full run.sh output"
              cat /tmp/run-out.plain
              echo "::endgroup::"
          fi
          exit $rc
  lint-macos:
    name: Lint (macOS / launchd plists)
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Show env diagnostics
        run: |
          echo "uname:     $(uname -a)"
          echo "bash:      $BASH_VERSION"
          echo "pwsh:      $(command -v pwsh || echo none)"
          command -v pwsh >/dev/null && pwsh -NoProfile -Command 'Get-Module -ListAvailable PSScriptAnalyzer | Select-Object Name,Version' || true
          echo "plutil:    $(command -v plutil || echo none)"
          echo "xmllint:   $(command -v xmllint || echo none)"
          echo "shellcheck: $(command -v shellcheck || echo none)"
      - name: Run install test suite
        env:
          BURBLE_INSTALL_TESTS_DEBUG: "1"
        run: |
          set +e
          tests/install/run.sh 2>&1 | tee /tmp/run-out.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" != "0" ]; then
              echo
              echo "::error title=run.sh failed::exit=$rc — FAIL lines surfaced as annotations below:"
              # Strip ANSI colour codes FIRST so awk sees plain text.
              # (fail() emits `  \033[0;31mFAIL\033[0m msg` — without
              # stripping, "FAIL " pattern won't match because of the
              # \033[0m sitting between FAIL and the space.)
              sed 's/\x1b\[[0-9;]*m//g' /tmp/run-out.log > /tmp/run-out.plain
              # GH caps annotations at ~10 per check-run. Surface ONLY
              # FAIL lines (with the 6-space-indented sub-line that
              # follows, which is where shellcheck/plutil/etc. dump
              # their actual error message).
              awk '/FAIL /{p=1; print; next} p && /^      /{print; next} {p=0}' /tmp/run-out.plain \
                | head -20 \
                | while IFS= read -r line; do
                    echo "::error::$line"
                done
              echo "::group::Full run.sh output"
              cat /tmp/run-out.plain
              echo "::endgroup::"
          fi
          exit $rc
  lint-windows:
    name: Lint (Windows / PowerShell + csc.exe)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
      - name: PowerShell AST parse
        shell: pwsh
        run: |
          $files = @('setup.ps1', 'scripts/wsl-bolt-udp-forward.ps1', 'tests/install/roundtrip-windows.ps1')
          $any = $false
          foreach ($f in $files) {
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  (Resolve-Path $f), [ref]$null, [ref]$errors) | Out-Null
              if ($errors -and $errors.Count -gt 0) {
                  Write-Host "FAIL parse: $f"
                  $errors | ForEach-Object { Write-Host "  $_" }
                  $any = $true
              } else {
                  Write-Host "PASS parse: $f"
              }
          }
          if ($any) { exit 1 }
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          # roundtrip-windows.ps1 deliberately uses patterns PSSA flags
          # (throwaway plain-text passwords, etc.) — covered by parse step,
          # not lint-gated. Keeps PSSA noise from drowning real findings.
          $files = @('setup.ps1', 'scripts/wsl-bolt-udp-forward.ps1')
          $any = $false
          foreach ($f in $files) {
              # Excluded rules (with rationale):
              #   PSAvoidUsingWriteHost — Write-Host is fine for a CLI tool
              #   PSAvoidUsingPlainTextForPassword — Get-Credential pattern;
              #     -RunAsUser flow is intentional and documented
              #   PSAvoidUsingConvertToSecureStringWithPlainText — only used
              #     in tests/install/roundtrip-windows.ps1 to build a
              #     throwaway credential for CI
              #   PSUseShouldProcessForStateChangingFunctions — these are
              #     user-invoked installers, not pipeline cmdlets; ShouldProcess
              #     is the wrong pattern (UX would prompt twice)
              #   PSAvoidUsingEmptyCatchBlock — intentional silent cleanup
              #     swallowing in finally{}/trap-equivalent paths
              #   PSUseSingularNouns — `Uninstall-Service` etc are domain verbs
              # Severity=Error only — Warning-level rules are mostly
              # stylistic (long lines, indentation) which we don't gate.
              $r = Invoke-ScriptAnalyzer -Path $f -Severity Error `
                   -ExcludeRule PSAvoidUsingWriteHost,
                                PSAvoidUsingPlainTextForPassword,
                                PSAvoidUsingConvertToSecureStringWithPlainText,
                                PSUseShouldProcessForStateChangingFunctions,
                                PSAvoidUsingEmptyCatchBlock,
                                PSUseSingularNouns,
                                PSReviewUnusedParameter,
                                PSUseApprovedVerbs,
                                PSAvoidGlobalVars,
                                PSUseDeclaredVarsMoreThanAssignments,
                                PSPossibleIncorrectComparisonWithNull,
                                PSAvoidUsingPositionalParameters,
                                PSMisleadingBacktick,
                                PSUseBOMForUnicodeEncodedFile
              if ($r) {
                  # Advisory only — see TODO in tests/install/run.sh: PSSA
                  # findings are reported but don't fail the lint job until
                  # we have an enumerated baseline.
                  Write-Host "ADVISORY analyzer findings: $f"
                  $r | Format-Table -AutoSize | Out-String | Write-Host
              } else {
                  Write-Host "PASS analyzer: $f"
              }
          }
      - name: C# service-host compile check (csc.exe + ServiceBase)
        shell: pwsh
        run: |
          # Extract the embedded C# source from wsl-bolt-udp-forward.ps1 and
          # try to compile it with the in-box .NET Framework csc.exe. This
          # is exactly what `-Install` does at runtime — proving it compiles
          # in CI means a real install on the user's machine won't blow up
          # at `Compile-ServiceHost`.
          $script = Get-Content scripts/wsl-bolt-udp-forward.ps1 -Raw
          # The source lives between `$script:ServiceSource = @'` and the
          # closing `'@` (single-quoted here-string).
          if ($script -notmatch "(?ms)\`$script:ServiceSource\s*=\s*@'\s*\r?\n(.*?)\r?\n'@") {
              Write-Host "Could not locate `$script:ServiceSource here-string"; exit 1
          }
          $src = $Matches[1]
          $tmpCs = New-TemporaryFile
          $tmpCs = [System.IO.Path]::ChangeExtension($tmpCs.FullName, '.cs')
          Set-Content -Path $tmpCs -Value $src -Encoding ASCII

          $csc = "$env:windir\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          if (-not (Test-Path $csc)) {
              $csc = "$env:windir\Microsoft.NET\Framework\v4.0.30319\csc.exe"
          }
          if (-not (Test-Path $csc)) {
              Write-Host "FAIL: csc.exe not found — install path would fail here too"; exit 1
          }
          Write-Host "Compiling with: $csc"

          $outExe = [System.IO.Path]::ChangeExtension($tmpCs, '.exe')
          & $csc /nologo /target:exe /reference:System.ServiceProcess.dll `
              "/out:$outExe" $tmpCs
          if ($LASTEXITCODE -ne 0) {
              Write-Host "FAIL: csc.exe compile failed"; exit $LASTEXITCODE
          }
          if (-not (Test-Path $outExe)) {
              Write-Host "FAIL: no exe produced"; exit 1
          }
          Write-Host "PASS: C# service host compiles cleanly ($outExe)"
