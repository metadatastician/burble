# SPDX-License-Identifier: MPL-2.0
# Elixir CI — test-pass evidence for CRG grade C.
name: Elixir CI
on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
    branches: [main, master]
permissions:
  contents: read
jobs:
  test:
    name: Test (OTP 27 / Elixir 1.17)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server/
    steps:
      - name: Checkout
        # No submodules: this job only builds ffi/zig and runs the server
        # suite, neither of which uses tools/affinescript — and that
        # submodule's pinned commit is currently unreachable upstream
        # ("upload-pack: not our ref"), which was hard-failing checkout
        # before any test could run.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Beam (OTP 27 + Elixir 1.17)
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: '27'
          elixir-version: '1.17'
      - name: Set up Zig 0.15
        # v2.2.1, not the old v1.2.2: v1.x predates Zig's post-0.14 tarball
        # rename (zig-linux-x86_64- -> zig-x86_64-linux-) and still probes
        # ziglang.org/builds (nightlies) instead of /download/<ver>/, so it
        # 404s on every Zig >= 0.14 regardless of the version string. v2.x
        # uses the community-mirror list + modern download index.
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          # Exact published tag (not 'latest') for deterministic CI;
          # tracks ffi/zig/build.zig's declared "Zig 0.15".
          version: '0.15.2'
      - name: Install just
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          # Pin an explicit modern just: the Justfile uses `import?`
          # (optional import, just >= 1.19.0). Unversioned `tool: just`
          # resolves via this action's bundled manifest, which shipped
          # just 1.14.0 -> `error: Unknown start of token` at
          # `import? "contractile.just"`, so `mix test --no-start`
          # never ran (root cause of the dead Elixir gate, burble#39).
          tool: just@1.34.0
      - name: Install system prerequisites for quicer/msquic
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake perl build-essential libssl-dev
      - name: Cache Mix dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            server/deps
            server/_build
          key: ${{ runner.os }}-mix-msquic-v2.3.8-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-msquic-v2.3.8-
            ${{ runner.os }}-mix-
      - name: Build Zig FFI
        working-directory: ${{ github.workspace }}
        # Re-armed as part of #39 follow-up: the Zig 0.15 / setup-beam
        # build path has been stable since #62 landed; the prior
        # GATE DEACTIVATED 2026-05-15 marker is removed. Every failure
        # still appears in this step's log and as a step annotation,
        # but a real FFI break now turns CI red — which is what users
        # of the coprocessor NIF depend on.
        run: |
          # erlef/setup-beam installs OTP under the tool cache, not at
          # build.zig's hardcoded /usr/lib/erlang default. Derive the real
          # NIF header dir from the running Erlang so erl_nif.h is found.
          # build.zig also resolves this dynamically (-Derl-include is
          # mode 1 of its 4-mode probe); passing it explicitly keeps CI
          # deterministic and independent of the fallback chain.
          ERL_INCLUDE="$(erl -noshell -eval 'io:format("~ts/usr/include", [code:root_dir()])' -s init stop)"
          echo "erl_nif.h include dir: $ERL_INCLUDE"
          test -f "$ERL_INCLUDE/erl_nif.h" || { echo "::error::erl_nif.h not found at $ERL_INCLUDE"; exit 1; }
          ( cd ffi/zig && zig build -Doptimize=ReleaseFast -Derl-include="$ERL_INCLUDE" )
          # Run the Zig unit tests too, so kernel/verifier regressions (e.g. the
          # BLE-SPA ble_spa_verify agreement with the committed vectors) turn CI
          # red rather than only surfacing at NIF load. Tests don't link the NIF
          # headers, so no -Derl-include is needed.
          ( cd ffi/zig && zig build test )
          cp ffi/zig/zig-out/lib/libburble_coprocessor.so server/priv/ 2>/dev/null || true
      - name: Run server tests
        working-directory: ${{ github.workspace }}
        # GATE RE-ARMED 2026-07-07: every pre-existing failure cluster is
        # fixed (LLM singleton stop/start app-collapse cascade, RTSP socket
        # ownership + instance threading, Groove :pop state wipe, Packet
        # format_mac, ProvenBridge constant_time_eq?, Timing drift/wraparound,
        # Topology, Store init-retry ladder, typing-throttle monotonic bug,
        # circuit-breaker test drift). A failing test turns this job red —
        # this is the CRG grade-C test-pass-evidence artefact (#35/#39).
        run: just test-server
  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    defaults:
      run:
        working-directory: server/
    steps:
      - name: Checkout
        # No submodules — same rationale as the test job above.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Beam (OTP 27 + Elixir 1.17)
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: '27'
          elixir-version: '1.17'
      - name: Install system prerequisites for quicer/msquic
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake perl build-essential libssl-dev
      - name: Restore PLT cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: plt-cache
        with:
          path: server/priv/plts
          key: ${{ runner.os }}-dialyzer-plt-otp27-elixir1.17-msquic-v2.3.8-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-dialyzer-plt-otp27-elixir1.17-msquic-v2.3.8-
            ${{ runner.os }}-dialyzer-plt-otp27-elixir1.17-
      - name: Cache Mix dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            server/deps
            server/_build
          key: ${{ runner.os }}-mix-msquic-v2.3.8-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-msquic-v2.3.8-
            ${{ runner.os }}-mix-
      - name: Install dependencies
        run: mix deps.get
      - name: Compile
        run: mix compile
      - name: Create PLT directory
        run: mkdir -p priv/plts
      - name: Run Dialyzer
        # GATE NARROWED 2026-05-25: Dialyzer ran clean before the
        # 2026-05-15 deactivation; the deactivation only landed because
        # the test job (which it `needs`) was itself suppressed.
        # However Dialyzer findings are typically Warning-level
        # type-correctness issues that need triage before re-gating
        # cleanly. Keep suppressed in this PR; re-arm in a follow-up
        # once any pre-existing findings have been addressed
        # (per-warning suppression in dialyzer mix config, *not*
        # blanket continue-on-error).
        continue-on-error: true
        run: mix dialyzer --plt-file priv/plts/dialyzer.plt
