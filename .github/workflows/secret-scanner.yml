# SPDX-License-Identifier: MPL-2.0
name: Secret Scanner
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  scan:
    uses: hyperpolymath/standards/.github/workflows/secret-scanner-reusable.yml@d135b05bfc647d0c0fbfedc7e80f37ea50f49236
    # The reusable's gitleaks job declares pull-requests:write + actions:read
    # (it posts a PR summary comment via the Issues/PR API). A called workflow
    # is capped at the CALLER's grant, so without these here GitHub refuses to
    # start it — the 0-second `startup_failure` seen estate-wide. Grant them at
    # the calling job (bumping the pin never fixes it; this is caller-side).
    permissions:
      contents: read
      pull-requests: write
      actions: read
    secrets: inherit
  # (The standalone trufflehog job was removed: the standards reusable's
  # gitleaks + rust-secrets + shell-secrets jobs are the canonical scan, and
  # standards dropped trufflehog as redundant. It was also failing on the
  # trufflehog-action's BASE==HEAD quirk, not on any real finding.)
