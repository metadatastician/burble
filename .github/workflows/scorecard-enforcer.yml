# SPDX-License-Identifier: PMPL-1.0-or-later
# Prevention workflow - runs OpenSSF Scorecard and fails on low scores
name: OpenSSF Scorecard Enforcer

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday
  workflow_dispatch:

# Estate guardrail: cancel superseded runs so re-pushes / rebased PR
# updates do not pile up queued runs against the shared account-wide
# Actions concurrency pool. Applied only to read-only check workflows
# (no publish/mutation), so cancelling a superseded run is always safe.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write  # For OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: results.sarif

      # Hand the SARIF to the enforce-score job. This must be a `uses:`
      # step: ossf/scorecard-action with publish_results: true requires
      # the scorecard job to contain ONLY `uses:` steps, or the results
      # webapp rejects publication with HTTP 400. The score gate that was
      # an inline `run:` here is therefore moved to enforce-score below.
      - name: Upload results for score gate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 1

  enforce-score:
    runs-on: ubuntu-latest
    needs: scorecard
    steps:
      - name: Download Scorecard results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: scorecard-sarif

      - name: Check minimum score
        run: |
          # Parse score from results
          SCORE=$(jq -r '.runs[0].tool.driver.properties.score // 0' results.sarif 2>/dev/null || echo "0")

          echo "OpenSSF Scorecard Score: $SCORE"

          # Minimum acceptable score (0-10 scale).
          # Lowered 5 -> 4 on 2026-05-15 by maintainer request: the real
          # measured score is 4.6 (genuine gaps: required code review,
          # branch protection, signed releases). 4 lets the current
          # posture pass while still failing on regression below today's
          # floor. This tracks reality; it is not a posture fix. Re-raise
          # toward 8+ as the underlying gaps are closed.
          MIN_SCORE=4

          if [ "$(echo "$SCORE < $MIN_SCORE" | bc -l)" = "1" ]; then
            echo "::error::Scorecard score $SCORE is below minimum $MIN_SCORE"
            exit 1
          fi

  # Check specific high-priority items
  check-critical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check SECURITY.md exists
        run: |
          if [ ! -f "SECURITY.md" ]; then
            echo "::error::SECURITY.md is required"
            exit 1
          fi

      - name: Check for pinned dependencies
        run: |
          # Check workflows for unpinned actions
          unpinned=$(grep -r "uses:.*@v[0-9]" .github/workflows/*.yml 2>/dev/null | grep -v "#" | head -5 || true)
          if [ -n "$unpinned" ]; then
            echo "::warning::Found unpinned actions:"
            echo "$unpinned"
          fi
