# SPDX-License-Identifier: MPL-2.0
#
# This file intentionally has no server blocks. It overwrites the
# pre-installed /etc/nginx/conf.d/nginx.default.conf in the Chainguard
# nginx image, which would otherwise win over containers/nginx.conf
# for requests to Host: localhost (the chainguard default has
# `server_name localhost`, more specific than our `server_name _`).
#
# The real Burble nginx config lives in containers/nginx.conf and is
# installed at /etc/nginx/conf.d/default.conf.
