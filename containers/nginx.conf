#
# Burble Web Client — nginx configuration for SPA routing.
#
# All non-file requests are routed to index.html so the ReScript
# SPA can handle client-side routing. Static assets are served
# directly with aggressive caching (Vite hashes filenames).

server {
    # Chainguard's nginx image runs rootless and cannot bind to ports < 1024.
    # The container listens on 8080 internally; the host port (4020 per
    # containers/compose.toml) is mapped to this port via podman.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Backend reverse proxy — Phoenix endpoint on the internal burble-net.
    # Service name `burble_server` resolves via podman's network DNS.
    # /api/ for REST endpoints (auth, rooms, presence, etc.)
    location /api/ {
        proxy_pass http://burble_server:4020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # /socket for Phoenix WebSocket signaling (WebRTC SDP/ICE exchange,
    # presence, room events). Requires the Upgrade/Connection header
    # passthrough so nginx forwards the WebSocket handshake correctly.
    location /socket {
        proxy_pass http://burble_server:4020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # Long-lived WS connections.
    }

    # /.well-known/ for Groove discovery (and future Burble Bolt over HTTP).
    location /.well-known/ {
        proxy_pass http://burble_server:4020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: any path that doesn't match a file → index.html.
    # Must come AFTER the proxy locations so /api/, /socket, /.well-known/
    # take precedence over the SPA catch-all.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets from Vite get long cache TTL.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression for text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
