#
# coturn configuration for Burble — STUN/TURN relay server.
#
# static-auth-secret, realm, and external-ip are injected at runtime via
# the compose command override in selur-compose.toml so they can be supplied
# as environment variables (TURN_SECRET, TURN_REALM, TURN_EXTERNAL_IP).
#
# For standalone deploys without compose, add these lines:
#   static-auth-secret=<openssl rand -hex 32>
#   realm=<your-domain.example.com>
#   external-ip=<your-public-ip>

use-auth-secret
fingerprint

# Ports — also open these in your firewall / security group:
#   3478/udp+tcp  STUN/TURN
#   5349/tcp      TURNS (TURN over TLS)
#   49152-65535/udp  relay port range
listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=65535

# Security: deny RFC1918 relay targets to prevent SSRF via TURN relay.
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Logging
log-file=stdout
no-software-attribute
