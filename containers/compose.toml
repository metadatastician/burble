# SPDX-License-Identifier: MPL-2.0
#
# Burble — Podman Compose configuration (legacy).
#
# PREFER: selur-compose.toml (selur-compose or podman-compose).
# This file is retained for backwards compatibility.
#
# Services:
#   burble-server  — Elixir OTP control plane + coprocessor NIFs
#   burble-web     — ReScript SPA (nginx)
#   verisimdb      — VeriSimDB database (Rust core)
#
# Ports:
#   4020 — Burble web client (public)
#   Internal: server on 4020, VeriSimDB on 8080

[project]
name = "burble"

[services.verisimdb]
# Pre-built image from GHCR (published by .github/workflows/publish-verisimdb.yml,
# which builds from hyperpolymath/nextgen-databases on a weekly schedule).
# Matches PR #28's approach on origin/main — no local submodule needed.
image = "ghcr.io/hyperpolymath/verisimdb:latest"
restart = "unless-stopped"
networks = ["burble-net"]
volumes = ["burble-verisimdb-data:/data"]
# Healthcheck tightened (2026-05-13, WS-1.6): start_period gives VeriSimDB
# 10s to bind its port before the first check fires; retries=5 tolerates
# brief restarts without marking the service unhealthy prematurely.
# NOTE: `start_interval` (faster polling during the start window) was dropped
# — selur-compose v0.1's Healthcheck schema does not model it and rejects
# unknown fields. The Burble.Store.init/1 retry loop (WS-1.6) is the real
# race fix; start_interval was only a polling-speed optimization. Re-add
# once selur-compose v0.2 supports it (tracked in v0.2 backlog).
healthcheck = { test = "wget -q --spider http://localhost:8080/health || exit 1", interval = "30s", timeout = "5s", retries = 5, start_period = "10s" }

[services.server]
build = { context = "..", dockerfile = "containers/Containerfile.server" }
depends_on = { verisimdb = { condition = "service_healthy" } }
restart = "unless-stopped"
networks = ["burble-net"]
environment = [
  "PHX_SERVER=true",
  "PORT=4020",
  # Uses the podman --name (burble_verisimdb), NOT the service name
  # (verisimdb). selur-compose v0.1 does not emit `--network-alias
  # <service>` the way Docker Compose does, so only the project-prefixed
  # --name is DNS-registered by aardvark-dns. Revert to "verisimdb" once
  # selur-compose v0.2 adds service-name network aliases.
  "VERISIMDB_URL=http://burble_verisimdb:8080",
  "BURBLE_TOPOLOGY=monarchic",
  # Proven NIF shared objects directory — pinned to mix.exs's @version.
  "PROVEN_LIB_DIR=/app/lib/burble-1.0.0/priv",
  # Phoenix and Guardian secrets — supplied via containers/.env (gitignored).
  # Run `openssl rand -base64 64` to regenerate.
  "SECRET_KEY_BASE=${SECRET_KEY_BASE}",
  "GUARDIAN_SECRET=${GUARDIAN_SECRET:-${SECRET_KEY_BASE}}",
]

[services.web]
build = { context = "..", dockerfile = "containers/Containerfile.web" }
ports = ["4020:8080"]
depends_on = ["server"]
restart = "unless-stopped"
networks = ["burble-net"]

# coturn pinned to 4.11.0-r0 @ sha256:5d1d717c0542b70c97c006ac8e38d4e9a6c9a7962ac7b1a11a7a2c42ab655902 on 2026-05-10.
# To upgrade: bump the tag, re-resolve the digest with
#   podman pull coturn/coturn:<NEW_TAG> && podman inspect ... --format '{{.Digest}}'
# and update both compose.toml and selur-compose.toml in the same commit.
[services.coturn]
image = "coturn/coturn:4.11.0-r0@sha256:5d1d717c0542b70c97c006ac8e38d4e9a6c9a7962ac7b1a11a7a2c42ab655902"
restart = "unless-stopped"
network_mode = "host"
volumes = [
  "./coturn.conf:/etc/coturn/turnserver.conf:ro",
  "coturn-data:/var/lib/coturn",
]
environment = [
  "TURN_SECRET=${TURN_SECRET:-change-me-in-production}",
  "TURN_REALM=${TURN_REALM:-burble.local}",
  "TURN_EXTERNAL_IP=${TURN_EXTERNAL_IP:-}",
]
entrypoint = ["/bin/sh", "-c"]
command = ["args='--config /etc/coturn/turnserver.conf'; args=\"$args --static-auth-secret=$TURN_SECRET --realm=$TURN_REALM\"; [ -n \"$TURN_EXTERNAL_IP\" ] && args=\"$args --external-ip=$TURN_EXTERNAL_IP\"; exec turnserver $args"]

[networks.burble-net]
driver = "bridge"

[volumes.coturn-data]
driver = "local"

[volumes.burble-verisimdb-data]
driver = "local"

