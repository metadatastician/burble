# SPDX-License-Identifier: MPL-2.0
# stapeln.toml — Layer-based container build for burble
#
# stapeln builds containers as composable layers (German: "to stack").
# Each layer is independently cacheable, verifiable, and signable.
#
# 2026-07-02: rewritten for burble's actual stack (Elixir/OTP release +
# Zig NIF). The previous version was RSR template drift describing a
# Rust/cargo project that never existed here, with a malformed
# entrypoint. Canonical container assets: containers/Containerfile.server.

[metadata]
name = "burble"
version = "0.1.0"
description = "burble voice server (Elixir/OTP + Zig coprocessor NIF)"
author = "Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"
license = "MPL-2.0"
registry = "ghcr.io/hyperpolymath"

[build]
containerfile = "containers/Containerfile.server"
context = "."
runtime = "podman"

# ── Layer Definitions ──────────────────────────────────────────

[layers.base]
description = "Chainguard Wolfi minimal base"
from = "cgr.dev/chainguard/wolfi-base:latest"
cache = true
verify = true

[layers.beam-toolchain]
description = "Erlang/OTP 27 + Elixir 1.17 + Zig 0.15 build toolchain"
extends = "base"
packages = ["erlang-27", "elixir-1.17", "zig", "build-base", "git"]
cache = true

[layers.mix-deps]
description = "Mix dependency fetch"
extends = "beam-toolchain"
commands = ["cd server && mix deps.get --only prod"]
cache-key = "server/mix.lock"
cache = true

[layers.build]
description = "Zig FFI + Elixir release build"
extends = "mix-deps"
commands = [
    "cd ffi/zig && zig build -Doptimize=ReleaseFast",
    "cp ffi/zig/zig-out/lib/libburble_coprocessor.so server/priv/ || true",
    "cd server && MIX_ENV=prod mix release",
]
artifacts = [
    { src = "server/_build/prod/rel/burble", dst = "/app" },
]

[layers.runtime]
description = "Minimal runtime"
from = "cgr.dev/chainguard/wolfi-base:latest"
packages = ["ca-certificates", "curl", "libstdc++", "ncurses"]
copy-from = [
    { layer = "build", src = "/app/", dst = "/app/" },
]
entrypoint = ["/app/bin/burble", "start"]
user = "nonroot"
expose = [6473, 7373]
env = { MIX_ENV = "prod" }

# ── Security ───────────────────────────────────────────────────

[security]
non-root = true
read-only-root = false
no-new-privileges = true
cap-drop = ["ALL"]
seccomp-profile = "default"

[security.signing]
algorithm = "ML-DSA-87"
provider = "cerro-torre"

[security.sbom]
format = "spdx-json"
output = "sbom.spdx.json"
include-deps = true

# ── Verification ───────────────────────────────────────────────

[verify]
vordr = true
svalinn = true
scan-on-build = true
fail-on = ["critical", "high"]

# ── Targets ────────────────────────────────────────────────────

[targets.development]
layers = ["base", "beam-toolchain", "build"]
env = { LOG_LEVEL = "debug" }

[targets.production]
layers = ["runtime"]
env = { LOG_LEVEL = "info" }

[targets.test]
layers = ["base", "beam-toolchain", "build"]
env = { LOG_LEVEL = "debug" }
