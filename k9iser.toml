# k9iser manifest — wrap configs into self-validating K9 contracts
# SPDX-License-Identifier: MPL-2.0
#
# burble: P2P voice chat with AI data channel (Elixir/Phoenix + WebRTC).
# Safety-tier "yard" — communication service, moderate scrutiny.

[project]
name = "burble"
safety-tier = "yard"  # communication service

# ── stapeln.toml — container layer build ─────────────────────────────────────

[[configs]]
name = "container-build"
source = "stapeln.toml"
format = "toml"
must = [
  "metadata.license == 'MPL-2.0'",
  "metadata.registry == 'ghcr.io/hyperpolymath'",
  "build.runtime == 'podman'",
  "layers.base.from starts-with 'cgr.dev/chainguard/'",
  "layers.base.verify == true",
  "layers.runtime.user == 'nonroot'",
  "layers.runtime.expose contains 4020",               # burble voice port 4020
  "security.non-root == true",
  "security.no-new-privileges == true",
  "security.cap-drop contains 'ALL'",
  "security.signing.algorithm == 'ML-DSA-87'",
  "security.signing.provider == 'cerro-torre'",
  "security.sbom.format == 'spdx-json'",
  "security.sbom.include-deps == true",
  "verify.vordr == true",
  "verify.svalinn == true",
  "verify.scan-on-build == true",
  "verify.fail-on contains 'critical'",
  "verify.fail-on contains 'high'",
]
trust = ["signed-by: ci-pipeline"]
dust = ["remove: unfilled {{PLACEHOLDER}} values"]
intend = ["production-ready", "supply-chain-verified"]

# ── containers/compose.toml — selur service orchestration ────────────────────

[[configs]]
name = "compose"
source = "containers/compose.toml"
format = "toml"
must = [
  "version is set",
  "services.svalinn is set",                           # Svalinn gateway always present
  "services.svalinn.ports contains '443:443'",         # TLS port mandatory
  "services.svalinn.restart == 'always'",
  "networks.default.driver == 'selur'",                # selur IPC driver required
]
trust = ["signed-by: ci-pipeline"]
dust = ["remove: unfilled {{PLACEHOLDER}} values in service names"]
intend = ["production-ready"]

# ── .well-known/groove/manifest.json — Groove protocol manifest ──────────────

[[configs]]
name = "groove-manifest"
source = ".well-known/groove/manifest.json"
format = "json"
must = [
  "groove_version is non-empty",
  "service_id == 'burble'",
  "service_version is non-empty",
  "capabilities.voice is set",                         # voice capability required
  "capabilities.voice.requires_auth == true",          # voice auth mandatory
  "capabilities.text.requires_auth == true",           # text auth mandatory
  "capabilities.presence.requires_auth == true",       # presence auth mandatory
  "endpoints.health is non-empty",                     # health endpoint declared
  "endpoints.groove is non-empty",                     # groove endpoint declared
]
trust = ["signed-by: ci-pipeline"]
dust = []
intend = ["production-ready"]

# ── admin/gossamer.conf.json — admin UI config ────────────────────────────────

[[configs]]
name = "admin-ui-config"
source = "admin/gossamer.conf.json"
format = "json"
must = [
  "app.security.sandbox.enabled == true",
  "app.ipc.timeout > 0",
  "bundle.license == 'MPL-2.0'",
]
trust = ["signed-by: ci-pipeline"]
dust = []
intend = ["production-ready"]

[validation]
strict = true
auto-fix = false
report-format = "text"
