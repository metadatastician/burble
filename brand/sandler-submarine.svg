<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="45%" stop-color="#0b1a12"/>
      <stop offset="100%" stop-color="#06120a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#sea)"/>

  <!-- Surface line + depth ticks -->
  <line x1="0" y1="120" x2="1280" y2="120" stroke="#3fb950" stroke-width="1" opacity="0.25" stroke-dasharray="6 8"/>
  <text x="64" y="60" font-family="system-ui,sans-serif" font-size="34" font-weight="300" fill="#e6edf3" letter-spacing="1">burble — the seven sealed compartments</text>
  <text x="64" y="92" font-family="system-ui,sans-serif" font-size="18" font-weight="300" fill="#8b949e">impact &amp; case-making, Sandler-submarine logic: seal each before you go deeper</text>
  <text x="1216" y="112" text-anchor="end" font-family="system-ui,sans-serif" font-size="14" font-weight="300" fill="#8b949e">surface</text>
  <text x="1216" y="600" text-anchor="end" font-family="system-ui,sans-serif" font-size="14" font-weight="300" fill="#8b949e">deep</text>

  <!-- Hull: descending, 7 compartments -->
  <g filter="url(#soft)">
    <!-- bow at left-high, stern at right-low: subtle dive -->
    <path d="M 150,250 Q 110,250 96,286 Q 110,322 150,322 L 1090,360 Q 1150,362 1150,331 Q 1150,300 1090,302 Z"
          fill="#0a2010" stroke="#3fb950" stroke-width="2.5"/>
    <!-- conning tower -->
    <path d="M 540,250 L 556,214 L 624,214 L 636,252 Z" fill="#0a2010" stroke="#3fb950" stroke-width="2.5"/>
    <line x1="590" y1="214" x2="590" y2="188" stroke="#3fb950" stroke-width="3"/>
    <circle cx="590" cy="186" r="4" fill="#3fb950"/>
    <!-- propeller -->
    <line x1="1150" y1="331" x2="1178" y2="318" stroke="#3fb950" stroke-width="2.5"/>
    <line x1="1178" y1="304" x2="1178" y2="332" stroke="#3fb950" stroke-width="4"/>
  </g>

  <!-- Bulkheads (6 lines → 7 compartments) along the dive -->
  <g stroke="#3fb950" stroke-width="1.6" opacity="0.6">
    <line x1="278" y1="254" x2="278" y2="320"/>
    <line x1="406" y1="259" x2="406" y2="325"/>
    <line x1="534" y1="263" x2="534" y2="330"/>
    <line x1="662" y1="268" x2="662" y2="335"/>
    <line x1="790" y1="273" x2="790" y2="340"/>
    <line x1="918" y1="278" x2="918" y2="345"/>
  </g>

  <!-- Compartment numbers -->
  <g font-family="system-ui,sans-serif" font-size="22" font-weight="400" fill="#3fb950" text-anchor="middle">
    <text x="214" y="296">1</text>
    <text x="342" y="300">2</text>
    <text x="470" y="305">3</text>
    <text x="598" y="310">4</text>
    <text x="726" y="315">5</text>
    <text x="854" y="320">6</text>
    <text x="1010" y="338">7</text>
  </g>

  <!-- Stage labels (Sandler stage : burble case) -->
  <g font-family="system-ui,sans-serif" font-weight="300" fill="#e6edf3">
    <g font-size="15">
      <text x="200" y="404" text-anchor="middle" fill="#3fb950" font-size="16">1 · Bonding</text>
      <text x="200" y="426" text-anchor="middle">Open MPL-2.0, no account,</text>
      <text x="200" y="444" text-anchor="middle">no download — just join</text>

      <text x="200" y="486" text-anchor="middle" fill="#3fb950" font-size="16">2 · Up-front contract</text>
      <text x="200" y="508" text-anchor="middle">IS self-hosted P2P voice +</text>
      <text x="200" y="526" text-anchor="middle">AI bridge; IS-NOT a SaaS</text>
    </g>
    <g font-size="15">
      <text x="470" y="404" text-anchor="middle" fill="#3fb950" font-size="16">3 · Pain</text>
      <text x="470" y="426" text-anchor="middle">Telemetry, lock-in, lag;</text>
      <text x="470" y="444" text-anchor="middle">two Claudes can't co-work</text>

      <text x="470" y="486" text-anchor="middle" fill="#3fb950" font-size="16">4 · Budget</text>
      <text x="470" y="508" text-anchor="middle">Zero infra for P2P; one</text>
      <text x="470" y="526" text-anchor="middle">command + your own server</text>
    </g>
    <g font-size="15">
      <text x="740" y="404" text-anchor="middle" fill="#3fb950" font-size="16">5 · Decision</text>
      <text x="740" y="426" text-anchor="middle">E2EE DTLS-SRTP, SFU not</text>
      <text x="740" y="444" text-anchor="middle">MCU — server never hears</text>

      <text x="740" y="486" text-anchor="middle" fill="#3fb950" font-size="16">6 · Fulfilment</text>
      <text x="740" y="508" text-anchor="middle">Voice + JSON DataChannel;</text>
      <text x="740" y="526" text-anchor="middle">Bolt magic-packet calls</text>
    </g>
    <g font-size="15">
      <text x="1010" y="446" text-anchor="middle" fill="#3fb950" font-size="16">7 · Post-sell</text>
      <text x="1010" y="468" text-anchor="middle">Hardening, CRG-C: gate</text>
      <text x="1010" y="486" text-anchor="middle">re-arm + PTP HW validation</text>
    </g>
  </g>
</svg>
